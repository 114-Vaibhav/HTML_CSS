<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Popup Using the target
    </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <a href="#popup">Click me for Popup</a>

    <div id="popup">
        <div class="modal-popup">
            <h2>Modal Popup</h2>
            <a class="close" href="#">Close</a>
            <div class="content">
                Simple modal popup using target
            </div>
        </div>
    </div>
    
</body>

</html>
