<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="carousel">
        <input type="radio" name="slides1" id="slide1">
        <input type="radio" name="slides1" id="slide2">
        <input type="radio" name="slides1" id="slide3">
        <input type="radio" name="slides1" id="slide4">

        <ul class="slides">
            <li class="slide">
                <!-- <img src="" alt="Slide 1"> -->
                <h1>Slide 1</h1>
            </li>
            <li class="slide">
                <!-- <img src="" alt="Slide 2"> -->
                <h1>Slide 2</h1>
            </li>
            <li class="slide">
                <!-- <img src="" alt="Slide 3"> -->
                <h1>Slide 3</h1>
            </li>
            <li class="slide">
                <!-- <img src="" alt="Slide 4"> -->
                <h1>Slide 4</h1>
            </li>
        </ul>

        <div class="controls">
            <label for="slide1"></label>
            <label for="slide2"></label>
            <label for="slide3"></label>
            <label for="slide4"></label>
        </div>
    </div>
</body>

</html>
